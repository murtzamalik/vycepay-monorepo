# VycePay - Live server deployment (paybridge-app)
#
# Deploys core stack + admin API + admin portal in one compose file.
#
# Run:
#   docker compose -f docker-compose.vycepay.live.yml up -d --build
#
# Port plan (avoids PayBridge services on this host):
#   PayBridge uses :8080, :8082, :8084, :7081 — do NOT map VycePay to those.
#   VycePay Live ports:
#     3307  -> MariaDB (host; avoids host :3306 conflicts)
#     8081  -> Choice Bank callback (fixed)
#     9090  -> BFF (mobile entry)
#     9091-9095 -> auth, kyc, wallet, transaction, activity
#     8090  -> admin API
#     8091  -> admin portal UI

name: vycepay-server

services:
  vycepay:
    build:
      context: .
      dockerfile: Dockerfile.vycepay.server
    container_name: vycepay-server
    ports:
      - "3307:3306"
      - "8081:8081"
      - "9090:9090"
      - "9091:9091"
      - "9092:9092"
      - "9093:9093"
      - "9094:9094"
      - "9095:9095"
      - "8090:8090"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      CHOICE_BANK_SENDER_ID: ${CHOICE_BANK_SENDER_ID}
      CHOICE_BANK_PRIVATE_KEY: ${CHOICE_BANK_PRIVATE_KEY}
      CHOICE_BANK_BASE_URL: ${CHOICE_BANK_BASE_URL:-https://baas-pilot.choicebankapi.com}
      AUTH_BASE_URL: ${AUTH_BASE_URL:-http://127.0.0.1:9091}
      KYC_BASE_URL: ${KYC_BASE_URL:-http://127.0.0.1:9092}
      WALLET_BASE_URL: ${WALLET_BASE_URL:-http://127.0.0.1:9093}
      TRANSACTION_BASE_URL: ${TRANSACTION_BASE_URL:-http://127.0.0.1:9094}
      ACTIVITY_BASE_URL: ${ACTIVITY_BASE_URL:-http://127.0.0.1:9095}
      CALLBACK_BASE_URL: ${CALLBACK_BASE_URL:-http://127.0.0.1:8081}
      SERVER_FORWARD_HEADERS_STRATEGY: ${SERVER_FORWARD_HEADERS_STRATEGY:-framework}
    volumes:
      - vycepay_mysql_data_server:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s
    restart: unless-stopped
    stop_grace_period: 60s

  admin:
    build:
      context: .
      dockerfile: Dockerfile.services
    container_name: vycepay-admin-service
    command: ["java", "-jar", "/app/admin.jar"]
    network_mode: "service:vycepay"
    depends_on:
      vycepay:
        condition: service_healthy
    environment:
      PORT: "8090"
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: "jdbc:mysql://127.0.0.1:3306/vycepay?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
      DB_USERNAME: vycepay
      DB_PASSWORD: vycepay
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      ADMIN_CORS_ORIGINS: ${ADMIN_CORS_ORIGINS:-http://localhost:8091}
      ADMIN_BOOTSTRAP_USERNAME: ${ADMIN_BOOTSTRAP_USERNAME:-}
      ADMIN_BOOTSTRAP_EMAIL: ${ADMIN_BOOTSTRAP_EMAIL:-}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-}
      ADMIN_HEALTH_BFF_URL: "http://127.0.0.1:9090/actuator/health"
      ADMIN_HEALTH_CALLBACK_URL: "http://127.0.0.1:8081/actuator/health"
      ADMIN_HEALTH_AUTH_URL: "http://127.0.0.1:9091/actuator/health"
      ADMIN_HEALTH_KYC_URL: "http://127.0.0.1:9092/actuator/health"
      ADMIN_HEALTH_WALLET_URL: "http://127.0.0.1:9093/actuator/health"
      ADMIN_HEALTH_TRANSACTION_URL: "http://127.0.0.1:9094/actuator/health"
      ADMIN_HEALTH_ACTIVITY_URL: "http://127.0.0.1:9095/actuator/health"
    restart: unless-stopped

  admin-portal:
    build:
      context: ./vycepay-admin-portal
      dockerfile: Dockerfile
    container_name: vycepay-admin-portal
    ports:
      - "8091:3000"
    environment:
      HOSTNAME: "0.0.0.0"
      ADMIN_API_URL: "http://vycepay:8090"
      NEXT_PUBLIC_ADMIN_API_URL: ${NEXT_PUBLIC_ADMIN_API_URL:-http://localhost:8090}
    depends_on:
      vycepay:
        condition: service_healthy
      admin:
        condition: service_started
    restart: unless-stopped

volumes:
  vycepay_mysql_data_server:
