    httpStatus: 404
    category: ACCOUNT
  "14001":
    clientCode: CHOICE_TX_NOT_FOUND
    httpStatus: 404
    category: TRANSACTION
  "14006":
    clientCode: CHOICE_TX_DAILY_LIMIT
    httpStatus: 400
    category: TRANSACTION
  "14007":
