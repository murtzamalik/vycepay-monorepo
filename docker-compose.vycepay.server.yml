# VycePay - Single container server deployment (callback on 8081, others on 9090-series)
#
# Run:
#   docker compose -f docker-compose.vycepay.server.yml up -d --build

name: vycepay-server

services:
  vycepay:
    build:
      context: .
      dockerfile: Dockerfile.vycepay.server
    container_name: vycepay-server
    ports:
      - "3306:3306"
      # callback must be 8081
      - "8081:8081"
      # admin API
      - "8090:8090"
      # other services on 9090-series
      - "9090:9090" # BFF
      - "9091:9091" # Auth
      - "9092:9092" # KYC
      - "9093:9093" # Wallet
      - "9094:9094" # Transaction
      - "9095:9095" # Activity
    environment:
      JWT_SECRET: ${JWT_SECRET:-vycepay-default-secret-key-min-256-bits-for-hs256}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-dev-only-admin-secret-change-before-prod-123456}
      ADMIN_CORS_ORIGINS: ${ADMIN_CORS_ORIGINS:-http://localhost:3000}
      ADMIN_BOOTSTRAP_USERNAME: ${ADMIN_BOOTSTRAP_USERNAME:-}
      ADMIN_BOOTSTRAP_EMAIL: ${ADMIN_BOOTSTRAP_EMAIL:-}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-}
      CHOICE_BANK_SENDER_ID: ${CHOICE_BANK_SENDER_ID:-}
      CHOICE_BANK_PRIVATE_KEY: ${CHOICE_BANK_PRIVATE_KEY:-}
      CHOICE_BANK_BASE_URL: ${CHOICE_BANK_BASE_URL:-https://baas-pilot.choicebankapi.com}
    volumes:
      - vycepay_mysql_data_server:/var/lib/mysql
    restart: unless-stopped

  admin-portal:
    build:
      context: ./vycepay-admin-portal
      dockerfile: Dockerfile
    container_name: vycepay-admin-portal
    environment:
      ADMIN_API_URL: "http://vycepay:8090"
      NEXT_PUBLIC_ADMIN_API_URL: "http://localhost:8090"
    depends_on:
      - vycepay
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  vycepay_mysql_data_server:
