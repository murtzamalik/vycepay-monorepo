# VycePay - Server deployment (external MySQL on DB host)
name: vycepay-server

services:
  vycepay:
    build:
      context: .
      dockerfile: Dockerfile.vycepay.server
      args:
        EMBED_MARIADB: "${VYCEPAY_EMBED_MARIADB:-false}"
    container_name: vycepay-server
    ports:
      - "8081:8081"
      - "8090:8090"
      - "9090:9090"
      - "9091:9091"
      - "9092:9092"
      - "9093:9093"
      - "9094:9094"
      - "9095:9095"
    environment:
      DB_HOST: ${DB_HOST:?DB_HOST is required}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-vycepay}
      DB_USERNAME: ${DB_USERNAME:-vycepay}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      ADMIN_CORS_ORIGINS: ${ADMIN_CORS_ORIGINS}
      ADMIN_BOOTSTRAP_USERNAME: ${ADMIN_BOOTSTRAP_USERNAME:-}
      ADMIN_BOOTSTRAP_EMAIL: ${ADMIN_BOOTSTRAP_EMAIL:-}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-}
      CHOICE_BANK_SENDER_ID: ${CHOICE_BANK_SENDER_ID:-}
      CHOICE_BANK_PRIVATE_KEY: ${CHOICE_BANK_PRIVATE_KEY:-}
      CHOICE_BANK_BASE_URL: ${CHOICE_BANK_BASE_URL:-https://baas-pilot.choicebankapi.com}
      SPRING_JPA_DATABASE_PLATFORM: ${SPRING_JPA_DATABASE_PLATFORM:-org.hibernate.dialect.MySQLDialect}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 120s
    restart: unless-stopped
    stop_grace_period: 60s

  admin-api:
    build:
      context: .
      dockerfile: Dockerfile.admin-service
    container_name: vycepay-admin-service
    network_mode: "service:vycepay"
    depends_on:
      vycepay:
        condition: service_started
    environment:
      PORT: "8090"
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      ADMIN_CORS_ORIGINS: ${ADMIN_CORS_ORIGINS}
      ADMIN_BOOTSTRAP_USERNAME: ${ADMIN_BOOTSTRAP_USERNAME:-}
      ADMIN_BOOTSTRAP_EMAIL: ${ADMIN_BOOTSTRAP_EMAIL:-}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-}
      DB_HOST: ${DB_HOST:?DB_HOST is required}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-vycepay}
      DB_USERNAME: ${DB_USERNAME:-vycepay}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      SPRING_DATASOURCE_URL: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_JPA_DATABASE_PLATFORM: ${SPRING_JPA_DATABASE_PLATFORM:-org.hibernate.dialect.MySQLDialect}
      ADMIN_HEALTH_BFF_URL: http://127.0.0.1:9090/actuator/health
      ADMIN_HEALTH_CALLBACK_URL: http://127.0.0.1:8081/actuator/health
      ADMIN_HEALTH_AUTH_URL: http://127.0.0.1:9091/actuator/health
      ADMIN_HEALTH_KYC_URL: http://127.0.0.1:9092/actuator/health
      ADMIN_HEALTH_WALLET_URL: http://127.0.0.1:9093/actuator/health
      ADMIN_HEALTH_TRANSACTION_URL: http://127.0.0.1:9094/actuator/health
      ADMIN_HEALTH_ACTIVITY_URL: http://127.0.0.1:9095/actuator/health
    restart: unless-stopped

  admin-portal:
    build:
      context: ./vycepay-admin-portal
      dockerfile: Dockerfile
    container_name: vycepay-admin-portal
    environment:
      ADMIN_API_URL: ${ADMIN_API_URL:-http://vycepay:8090}
      NEXT_PUBLIC_ADMIN_API_URL: ${NEXT_PUBLIC_ADMIN_API_URL}
      ADMIN_ALLOW_HTTP_COOKIES: ${ADMIN_ALLOW_HTTP_COOKIES:-true}
    depends_on:
      vycepay:
        condition: service_healthy
      admin-api:
        condition: service_started
    ports:
      - "${ADMIN_PORTAL_HOST_PORT:-8091}:3000"
    restart: unless-stopped
