spring:
  application:
    name: vycepay-callback-service
  datasource:
    url: jdbc:mysql://localhost:3306/vycepay?useSSL=false&serverTimezone=UTC
    username: ${DB_USERNAME:vycepay}
    password: ${DB_PASSWORD:vycepay}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${PORT:8081}

vycepay:
  callback:
    verify-signature: ${CALLBACK_VERIFY_SIGNATURE:true}
  firebase:
    # Set true in environments with a Firebase service account (same project as Android com.vycepay).
    enabled: ${FIREBASE_ENABLED:false}
    # Prefer env JSON secret; alternatively set credentials-path to a mounted file.
    credentials-json: ${FIREBASE_CREDENTIALS_JSON:}
    credentials-path: ${FIREBASE_CREDENTIALS_PATH:}
  choice-bank:
    base-url: ${CHOICE_BANK_BASE_URL:https://baas.choicedigitalbank.com}
    sender-id: ${CHOICE_BANK_SENDER_ID:}
    private-key: ${CHOICE_BANK_PRIVATE_KEY:}

logging:
  level:
    com.vycepay: DEBUG
    org.springframework.web: INFO
